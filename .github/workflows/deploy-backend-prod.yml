name: Deploy Backend to Azure (Production)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-prod.yml"
  workflow_dispatch:

env:
  REGISTRY_NAME: divancosaasacr
  IMAGE_NAME: divancosaas-backend
  APP_NAME: divancosaas-api-prod
  RESOURCE_GROUP: rg-divancosaas-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: divancosaasacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME_PROD }}
          password: ${{ secrets.ACR_PASSWORD_PROD }}

      - name: Build and push Docker image
        working-directory: ./backend
        run: |
          docker build . -t divancosaasacr.azurecr.io/divancosaas-backend:${{ github.sha }}
          docker build . -t divancosaasacr.azurecr.io/divancosaas-backend:latest
          docker push divancosaasacr.azurecr.io/divancosaas-backend:${{ github.sha }}
          docker push divancosaasacr.azurecr.io/divancosaas-backend:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: divancosaas-api-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          images: divancosaasacr.azurecr.io/divancosaas-backend:${{ github.sha }}

      - name: Run Prisma Migrations
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: npx prisma migrate deploy
